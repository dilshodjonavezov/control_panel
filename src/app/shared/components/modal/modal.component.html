@if (show) {
  <div
    class="fixed inset-0 z-[100] bg-slate-950/45 backdrop-blur-sm"
    (click)="onBackdropClick($event)"
  >
    <div class="flex min-h-full items-center justify-center p-4 sm:p-6">
      <div
        class="relative z-[101] flex max-h-[calc(100vh-2rem)] w-full flex-col overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-2xl shadow-slate-900/20 sm:max-h-[calc(100vh-3rem)] {{ sizeClasses }}"
      >
        @if (title || closable) {
          <div class="flex items-center justify-between border-b border-slate-200 px-6 py-5">
            @if (title) {
              <h3 class="text-lg font-semibold text-slate-900">{{ title }}</h3>
            }
            @if (closable) {
              <button
                type="button"
                (click)="close()"
                class="inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 focus:outline-none"
              >
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            }
          </div>
        }

        <div class="overflow-y-auto px-6 py-5">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
}
