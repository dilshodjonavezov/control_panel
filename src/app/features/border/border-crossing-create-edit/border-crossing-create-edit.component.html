<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Запись о пересечении границы</h1>
    <p class="mt-2 text-gray-600">Фиксация въезда/выезда и статуса «За границей».</p>
  </div>

  <app-card title="Пересечение">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="ФИО" [(ngModel)]="record.fullName"></app-input>
      <app-input label="Дата пересечения" type="date" [(ngModel)]="record.crossingDate"></app-input>
      <app-select label="Тип" [options]="typeOptions" [(ngModel)]="record.type"></app-select>
      <app-input label="КПП" [(ngModel)]="record.checkpoint"></app-input>
      <app-input label="Страна" [(ngModel)]="record.country"></app-input>
      <app-input label="Комментарий" [(ngModel)]="record.notes"></app-input>
    </div>
    <div class="mt-4 text-sm text-cyan-700">
      Если нет въезда &gt; 6 месяцев — статус ABROAD и событие в военкомат.
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <app-button variant="primary" (clicked)="save()">Сохранить</app-button>
    <app-button variant="secondary" (clicked)="update()">Сохранить изменение</app-button>
  </div>

  @if (status()) {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-cyan-700">{{ status() }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }
</div>
