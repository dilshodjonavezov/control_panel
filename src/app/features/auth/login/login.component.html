<div class="flex min-h-screen items-center justify-center bg-gray-100 px-4">
  <app-card class="w-full max-w-md">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-900">Вход в систему</h1>
      <p class="mt-2 text-gray-600">Введите логин и пароль пользователя.</p>
    </div>

    <div class="mt-6 space-y-4">
      <app-input
        label="Логин"
        type="text"
        [(ngModel)]="username"
        (ngModelChange)="onCredentialsChange()"
        placeholder="Введите логин"
      ></app-input>

      <app-input
        label="Пароль"
        type="password"
        [(ngModel)]="password"
        (ngModelChange)="onCredentialsChange()"
        placeholder="Введите пароль"
      ></app-input>

      @if (submitError) {
        <p class="text-sm text-red-600">{{ submitError }}</p>
      }
    </div>

    <div class="mt-6">
      <app-button
        variant="primary"
        [fullWidth]="true"
        [loading]="isSubmitting"
        (clicked)="submit()"
      >
        Войти
      </app-button>
    </div>
  </app-card>
</div>
