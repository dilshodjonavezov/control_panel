<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <app-card class="w-full max-w-md">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-900">Вход в систему</h1>
      <p class="mt-2 text-gray-600">
        {{ routeRole ? 'Введите данные для входа' : 'Введите admin password для выбора роли' }}
      </p>
    </div>

    <div class="mt-6 space-y-4">
      <app-input label="Логин" type="text" [(ngModel)]="email" placeholder="admin"></app-input>

      <app-input
        label="Пароль"
        type="password"
        [(ngModel)]="password"
        placeholder="password"
      ></app-input>

      @if (!canSelectRole() && password.trim()) {}

      @if (canSelectRole()) {
        <div class="w-full">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="role-select">Роль</label>
          <select
            id="role-select"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [ngModel]="role"
            (ngModelChange)="onRoleChange($event)"
          >
            @for (option of roleOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </div>
      }

      @if (submitError) {
        <p class="text-sm text-red-600">{{ submitError }}</p>
      }
    </div>

    <div class="mt-6">
      <app-button
        variant="primary"
        [fullWidth]="true"
        [loading]="isSubmitting"
        (clicked)="submit()"
      >
        Войти
      </app-button>
    </div>
  </app-card>
</div>
