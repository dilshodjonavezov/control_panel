<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-gray-900">Новая запись о рождении</h1>
    <p class="mt-2 text-gray-600">Заполните сведения и отправьте запись в центральную систему.</p>
  </div>

  <app-card>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input
        label="Дата и время рождения"
        type="datetime-local"
        [(ngModel)]="form.birthDateTime"
        [disabled]="!canEdit()"
      ></app-input>
      <app-input
        label="Место рождения"
        placeholder="Город, роддом, отделение"
        [(ngModel)]="form.place"
        [disabled]="!canEdit()"
      ></app-input>
      <app-select
        label="Пол"
        [options]="sexOptions"
        [(ngModel)]="form.sex"
        [disabled]="!canEdit()"
      ></app-select>
      <app-input
        label="ФИО матери"
        placeholder="Фамилия Имя Отчество"
        [(ngModel)]="form.motherFullName"
        [disabled]="!canEdit()"
      ></app-input>
      <app-input
        label="ФИО отца"
        placeholder="Фамилия Имя Отчество"
        [(ngModel)]="form.fatherFullName"
        [disabled]="!canEdit()"
      ></app-input>
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <!-- <app-button variant="outline" (clicked)="saveDraft()" [disabled]="status() === 'SUBMITTED'">Сохранить черновик</app-button> -->
    <app-button variant="primary" (clicked)="submit()" [disabled]="status() === 'SUBMITTED'">Отправить</app-button>
    <!-- <span class="text-sm text-gray-500">Редактирование возможно до статуса SUBMITTED.</span> -->
  </div>

  @if (status() === 'DRAFT') {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-teal-700">{{ getStatusLabel(status()!) }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }

  
</div>
