<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Запись об обучении</h1>
      <p class="mt-2 text-gray-600">Создание и обновление статуса обучения.</p>
    </div>
    @if (!embedded) {
      <app-button variant="outline" (clicked)="goBack()">Назад к списку</app-button>
    }
  </div>

  <app-card title="Ученик">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="Фамилия" [(ngModel)]="record.lastName"></app-input>
      <app-input label="Имя" [(ngModel)]="record.firstName"></app-input>
      <app-input label="Отчество" [(ngModel)]="record.middleName"></app-input>
    </div>
  </app-card>

  <app-card title="Обучение">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="Школа" [(ngModel)]="record.schoolName"></app-input>
      <app-input label="Класс" [(ngModel)]="record.classLevel"></app-input>
      <app-select label="Статус" [options]="statusOptions" [(ngModel)]="record.status"></app-select>
      <app-input label="Дата начала" type="date" [(ngModel)]="record.startDate"></app-input>
      <app-input label="Дата окончания" type="date" [(ngModel)]="record.endDate"></app-input>
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <app-button variant="primary" (clicked)="save()">Сохранить</app-button>
    <app-button variant="secondary" (clicked)="update()">Сохранить изменение</app-button>
  </div>

  @if (status()) {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-amber-700">{{ status() }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }
</div>
