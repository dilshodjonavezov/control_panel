<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-gray-900">Вложения</h1>
    <p class="mt-2 text-gray-600">Прикрепление файлов к медицинской карте.</p>
  </div>

  <app-card title="Загрузка">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="file" class="block w-full text-sm text-gray-700" />
      <app-input label="Описание" [(ngModel)]="description"></app-input>
    </div>
    <div class="mt-4">
      <app-button variant="primary" (clicked)="upload()">Загрузить</app-button>
    </div>
  </app-card>

  <app-card title="Файлы">
    <div class="space-y-3">
      @for (file of attachments; track file.id) {
        <div class="flex flex-wrap items-center justify-between gap-3 border border-gray-100 rounded-lg p-3">
          <div>
            <div class="font-medium text-gray-900">{{ file.name }}</div>
            <div class="text-sm text-gray-500">{{ file.uploadedAt }} � {{ file.size }}</div>
          </div>
          <app-button variant="outline" size="sm" (clicked)="remove(file)">Удалить</app-button>
        </div>
      }
      @if (!attachments.length) {
        <div class="text-sm text-gray-500">Файлы не загружены.</div>
      }
    </div>
  </app-card>
</div>
