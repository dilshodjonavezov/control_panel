<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Доступы пользователей</h1>
      <p class="mt-2 text-gray-600">Распределение доступа и фильтрация по ролям.</p>
    </div>
    <app-button variant="primary" (clicked)="openRoleModal()">Добавить роль</app-button>
  </div>

  <app-card>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-select label="Роль" [options]="roleOptions" [(ngModel)]="roleFilter"></app-select>
      <app-input label="Поиск" placeholder="ФИО или email" [(ngModel)]="searchQuery"></app-input>
    </div>
  </app-card>

  <app-card>
    <app-table
      [columns]="columns"
      [data]="filteredUsers"
      [rowTemplate]="rowTemplate"
      [emptyMessage]="'Пользователи не найдены'"
    >
      <ng-template #rowTemplate let-row>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.fullName }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.email }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ getRoleLabel(row.role) }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.accessLevel }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ getStatusLabel(row.status) }}</td>
      </ng-template>
    </app-table>
  </app-card>

  <app-modal [show]="showRoleModal" [title]="'Добавить новую роль'" size="lg" (closed)="closeRoleModal()">
    <div class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <app-input label="Код роли" placeholder="example-role" [(ngModel)]="roleForm.value"></app-input>
        <app-input label="Название роли" placeholder="Новая роль" [(ngModel)]="roleForm.label"></app-input>
      </div>
      <div class="flex items-center gap-2">
        <app-button variant="primary" (clicked)="addRole()">Сохранить</app-button>
        <app-button variant="outline" (clicked)="closeRoleModal()">Отмена</app-button>
      </div>
    </div>
  </app-modal>
</div>
