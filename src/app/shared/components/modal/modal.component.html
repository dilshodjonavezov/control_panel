@if (show) {
  <div
    class="fixed inset-0 z-50 overflow-y-auto"
    (click)="onBackdropClick($event)"
  >
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <!-- Background overlay -->
      <div class="fixed inset-0 transition-opacity bg-gray-500 opacity-50 z-40"></div>

      <!-- Center modal -->
      <div class="relative z-50 inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle w-full {{ sizeClasses }}">
        <!-- Header -->
        @if (title || closable) {
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            @if (title) {
              <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
            }
            @if (closable) {
              <button
                (click)="close()"
                class="text-gray-400 hover:text-gray-600 focus:outline-none"
              >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            }
          </div>
        }

        <!-- Content -->
        <div class="px-6 py-4">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
}
