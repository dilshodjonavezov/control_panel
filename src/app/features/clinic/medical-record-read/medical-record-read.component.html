<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Электронная карта пациента</h1>
      <p class="mt-2 text-gray-600">Просмотр карты и истории посещений.</p>
    </div>
    <app-button variant="primary" (clicked)="addVisit()">Добавить посещение</app-button>
  </div>

  <app-card title="Поиск гражданина">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="Citizen ID" [(ngModel)]="search.citizenId"></app-input>
      <app-input label="ИИН" [(ngModel)]="search.iin"></app-input>
    </div>
  </app-card>

  <!-- <app-citizen-read-card [citizen]="citizen()"></app-citizen-read-card> -->

  <!-- @if (recordStatus() === 'MISSING') {
    <app-card>
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="text-sm text-gray-600">Медицинская карта отсутствует. Вы можете создать новую.</div>
        <app-button variant="primary" (clicked)="createRecord()">Создать карту</app-button>
      </div>
    </app-card>
  } -->

  @if (recordStatus() === 'EXISTS') {
    <!-- <app-card>
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <div class="text-sm text-gray-500">Статус карты</div>
          <div class="font-semibold text-gray-900">Активна</div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <app-button variant="outline" (clicked)="editRecord()">Изменить карту</app-button>
          <app-button variant="outline" (clicked)="openAttachments()">Вложения</app-button>
          <app-button variant="outline" (clicked)="addVisit()">Добавить посещение</app-button>
        </div>
      </div>
    </app-card> -->

    <app-card>
      <app-table
        [columns]="columns"
        [data]="visits"
        [rowTemplate]="rowTemplate"
        [actionsTemplate]="actionsTemplate"
        [emptyMessage]="'Посещений нет'"
      >
        <ng-template #rowTemplate let-row>
          <td class="px-6 py-4 text-sm text-gray-900">{{ row.date }}</td>
          <td class="px-6 py-4 text-sm text-gray-900">{{ row.doctor }}</td>
          <td class="px-6 py-4 text-sm text-gray-900">{{ row.diagnosis }}</td>
          <td class="px-6 py-4 text-sm text-gray-900">{{ getStatusLabel(row.status) }}</td>
        </ng-template>

        <ng-template #actionsTemplate let-row>
          <div class="flex items-center gap-2">
            <app-button variant="outline" size="sm" (clicked)="openVisit(row)">Открыть</app-button>
          </div>
        </ng-template>
      </app-table>
    </app-card>
  }

  <app-modal [show]="showVisitModal" [title]="'Посещение'" size="xl" (closed)="closeVisitModal()">
    @if (showVisitModal) {
      <app-medical-visit-add-edit
        [recordId]="selectedVisitId"
        [embedded]="true"
        (closed)="closeVisitModal()"
        (saved)="handleVisitSaved($event)"
      ></app-medical-visit-add-edit>
    }
  </app-modal>

  <app-modal [show]="showAttachmentsModal" [title]="'Вложения'" size="lg" (closed)="closeAttachments()">
    @if (showAttachmentsModal) {
      <app-attachments-upload></app-attachments-upload>
    }
  </app-modal>

  <app-modal [show]="showRecordModal" [title]="'Медицинская карта'" size="lg" (closed)="closeRecordModal()">
    @if (showRecordModal) {
      <app-medical-record-create-edit [citizen]="citizen()" [embedded]="true" (closed)="closeRecordModal()"></app-medical-record-create-edit>
    }
  </app-modal>
</div>
