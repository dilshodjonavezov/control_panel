<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-gray-900">Регистрация акта</h1>
    <p class="mt-2 text-gray-600">Создайте акт и передайте событие в систему.</p>
  </div>

  <app-card title="Тип акта">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-select label="Тип" [options]="typeOptions" [(ngModel)]="actType"></app-select>
    </div>
  </app-card>

  <app-card title="Сведения о браке">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input
        label="Дата регистрации"
        type="date"
        [(ngModel)]="marriage.marriageDate"
      ></app-input>
      <app-input
        label="Место регистрации"
        placeholder="Город, ЗАГС"
        [(ngModel)]="marriage.place"
      ></app-input>
      <app-input
        label="Орган ЗАГС"
        placeholder="Наименование отдела"
        [(ngModel)]="marriage.registryOffice"
      ></app-input>
      <app-input
        label="Номер свидетельства"
        placeholder="Серия/номер"
        [(ngModel)]="marriage.certificateNumber"
      ></app-input>
    </div>
  </app-card>

  <app-card title="Супруг 1">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input
        label="ФИО"
        placeholder="Фамилия Имя Отчество"
        [(ngModel)]="marriage.spouseOneFullName"
      ></app-input>
      <app-input label="ИИН" [(ngModel)]="marriage.spouseOneIin"></app-input>
      <app-input
        label="Дата рождения"
        type="date"
        [(ngModel)]="marriage.spouseOneBirthDate"
      ></app-input>
      <app-input
        label="Гражданство"
        placeholder="Страна"
        [(ngModel)]="marriage.spouseOneCitizenship"
      ></app-input>
    </div>
  </app-card>

  <app-card title="Супруг 2">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input
        label="ФИО"
        placeholder="Фамилия Имя Отчество"
        [(ngModel)]="marriage.spouseTwoFullName"
      ></app-input>
      <app-input label="ИИН" [(ngModel)]="marriage.spouseTwoIin"></app-input>
      <app-input
        label="Дата рождения"
        type="date"
        [(ngModel)]="marriage.spouseTwoBirthDate"
      ></app-input>
      <app-input
        label="Гражданство"
        placeholder="Страна"
        [(ngModel)]="marriage.spouseTwoCitizenship"
      ></app-input>
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <app-button variant="outline" (clicked)="saveDraft()">Сохранить черновик</app-button>
    <app-button variant="primary" (clicked)="registerAct()">Зарегистрировать</app-button>
  </div>

  @if (status()) {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-indigo-700">{{ getStatusLabel(status()!) }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }
</div>
