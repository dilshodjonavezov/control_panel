@if (citizen) {
  <app-card title="Гражданин">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-900">

      <div>
        <span class="text-gray-500">ИИН:</span>
        <div class="font-medium">{{ citizen.iin }}</div>
      </div>
      <div>
        <span class="text-gray-500">ФИО:</span>
        <div class="font-medium">{{ citizen.fullName }}</div>
      </div>
      <div>
        <span class="text-gray-500">Дата рождения:</span>
        <div class="font-medium">{{ citizen.birthDate }}</div>
      </div>
      <div>
        <span class="text-gray-500">Статус:</span>
        <div class="font-medium" [ngClass]="{ 'text-cyan-700': citizen.status === 'ABROAD', 'text-emerald-700': citizen.status === 'ACTIVE', 'text-red-700': citizen.status !== 'ACTIVE' && citizen.status !== 'ABROAD' }">
          {{ citizen.status }}
        </div>
      </div>
      <div>
        <span class="text-gray-500">Последний въезд:</span>
        <div class="font-medium">{{ citizen.lastEntryDate || '—' }}</div>
      </div>
    </div>
  </app-card>
} @else {
  <app-card title="Гражданин">
    <div class="text-sm text-gray-500">Гражданин не выбран. Выберите запись в реестре пересечений.</div>
  </app-card>
}
